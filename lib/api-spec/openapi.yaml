openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FlowApp API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard summary and analytics
  - name: categories
    description: Booking categories (Wedding, Prewedding, etc.)
  - name: packages
    description: Service packages
  - name: addons
    description: Booking add-ons
  - name: team
    description: Team members (photographer, MUA, hair stylist, editor)
  - name: clients
    description: CRM client records
  - name: bookings
    description: Bookings / projects
  - name: invoices
    description: Auto-generated invoices
  - name: files
    description: File delivery and photo selection
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: updateCategory
      tags: [categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      responses:
        "204":
          description: Deleted

  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      responses:
        "200":
          description: List of packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"
    post:
      operationId: createPackage
      tags: [packages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getPackage
      tags: [packages]
      responses:
        "200":
          description: Package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
    patch:
      operationId: updatePackage
      tags: [packages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
    delete:
      operationId: deletePackage
      tags: [packages]
      responses:
        "204":
          description: Deleted

  /addons:
    get:
      operationId: listAddOns
      tags: [addons]
      responses:
        "200":
          description: List of add-ons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AddOn"
    post:
      operationId: createAddOn
      tags: [addons]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOnInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddOn"

  /addons/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: updateAddOn
      tags: [addons]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOnUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddOn"
    delete:
      operationId: deleteAddOn
      tags: [addons]
      responses:
        "204":
          description: Deleted

  /team:
    get:
      operationId: listTeamMembers
      tags: [team]
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: createTeamMember
      tags: [team]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: updateTeamMember
      tags: [team]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: deleteTeamMember
      tags: [team]
      responses:
        "204":
          description: Deleted

  /team-payments:
    get:
      operationId: listTeamPayments
      tags: [teamPayments]
      responses:
        "200":
          description: List of team payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamPayment"
    post:
      operationId: createTeamPayment
      tags: [teamPayments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamPaymentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamPayment"

  /team-payments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: updateTeamPayment
      tags: [teamPayments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamPaymentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamPayment"
    delete:
      operationId: deleteTeamPayment
      tags: [teamPayments]
      responses:
        "204":
          description: Deleted

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getClient
      tags: [clients]
      responses:
        "200":
          description: Client detail with booking history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"
    patch:
      operationId: updateClient
      tags: [clients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      responses:
        "204":
          description: Deleted

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BookingStatus"
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get full booking detail (client, package, team, addons, invoice, files)
      responses:
        "200":
          description: Booking detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetail"
    patch:
      operationId: updateBooking
      tags: [bookings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    delete:
      operationId: deleteBooking
      tags: [bookings]
      responses:
        "204":
          description: Deleted

  /bookings/{id}/status:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /calendar:
    get:
      operationId: getCalendarBookings
      tags: [bookings]
      summary: Bookings with event dates for calendar view
      responses:
        "200":
          description: Calendar entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEntry"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getInvoice
      tags: [invoices]
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
    patch:
      operationId: updateInvoicePayment
      tags: [invoices]
      summary: Record a payment against an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoicePaymentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /bookings/{bookingId}/files:
    parameters:
      - name: bookingId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: listBookingFiles
      tags: [files]
      responses:
        "200":
          description: List of files for a booking
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryFile"
    post:
      operationId: createBookingFile
      tags: [files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryFileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryFile"

  /files/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    delete:
      operationId: deleteBookingFile
      tags: [files]
      responses:
        "204":
          description: Deleted

  /files/{id}/select:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: toggleFileSelection
      tags: [files]
      summary: Toggle client photo selection for a file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileSelectionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryFile"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardSummary:
      type: object
      required:
        [totalBookings, upcomingShoots, totalRevenue, outstandingAmount, bookingsByStatus, recentBookings]
      properties:
        totalBookings:
          type: integer
        upcomingShoots:
          type: integer
        totalRevenue:
          type: number
        outstandingAmount:
          type: number
        bookingsByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        recentBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          $ref: "#/components/schemas/BookingStatus"
        count:
          type: integer

    Category:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    Package:
      type: object
      required: [id, name, price, includedEditedPhotos, estimatedDays, createdAt]
      properties:
        id:
          type: integer
        categoryId:
          type: ["integer", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        includedEditedPhotos:
          type: integer
        estimatedDays:
          type: integer
        createdAt:
          type: string
          format: date-time

    PackageInput:
      type: object
      required: [name, price, includedEditedPhotos, estimatedDays]
      properties:
        categoryId:
          type: integer
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        includedEditedPhotos:
          type: integer
          minimum: 0
        estimatedDays:
          type: integer
          minimum: 1

    PackageUpdate:
      type: object
      properties:
        categoryId:
          type: integer
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        includedEditedPhotos:
          type: integer
          minimum: 0
        estimatedDays:
          type: integer
          minimum: 1

    AddOn:
      type: object
      required: [id, name, price, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        createdAt:
          type: string
          format: date-time

    AddOnInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0

    AddOnUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0

    TeamRole:
      type: string

    TeamMember:
      type: object
      required: [id, name, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          $ref: "#/components/schemas/TeamRole"
        photoUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        portfolioUrl:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    TeamMemberInput:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
          minLength: 1
        role:
          $ref: "#/components/schemas/TeamRole"
        photoUrl:
          type: string
        bio:
          type: string
        portfolioUrl:
          type: string
        whatsapp:
          type: string

    TeamMemberUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        role:
          $ref: "#/components/schemas/TeamRole"
        photoUrl:
          type: string
        bio:
          type: string
        portfolioUrl:
          type: string
        whatsapp:
          type: string

    TeamPayment:
      type: object
      required: [id, freelancerName, role, eventsCount, ratePerEvent, paidAmount, createdAt]
      properties:
        id:
          type: integer
        freelancerName:
          type: string
        role:
          type: string
        eventsCount:
          type: integer
        ratePerEvent:
          type: integer
        paidAmount:
          type: integer
        createdAt:
          type: string
          format: date-time

    TeamPaymentInput:
      type: object
      required: [freelancerName, role, eventsCount, ratePerEvent, paidAmount]
      properties:
        freelancerName:
          type: string
        role:
          type: string
        eventsCount:
          type: integer
        ratePerEvent:
          type: integer
        paidAmount:
          type: integer

    TeamPaymentUpdate:
      type: object
      properties:
        freelancerName:
          type: string
        role:
          type: string
        eventsCount:
          type: integer
        ratePerEvent:
          type: integer
        paidAmount:
          type: integer

    ClientOrigin:
      type: string
      enum: [local, out_of_city, out_of_island, international]

    Client:
      type: object
      required: [id, name, email, whatsapp, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        whatsapp:
          type: string
        city:
          type: ["string", "null"]
        province:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        clientOrigin:
          $ref: "#/components/schemas/ClientOrigin"
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ClientInput:
      type: object
      required: [name, email, whatsapp]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        whatsapp:
          type: string
        city:
          type: string
        province:
          type: string
        country:
          type: string
        clientOrigin:
          $ref: "#/components/schemas/ClientOrigin"
        notes:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        whatsapp:
          type: string
        city:
          type: string
        province:
          type: string
        country:
          type: string
        clientOrigin:
          $ref: "#/components/schemas/ClientOrigin"
        notes:
          type: string

    ClientDetail:
      allOf:
        - $ref: "#/components/schemas/Client"
        - type: object
          required: [bookings, totalSpent]
          properties:
            bookings:
              type: array
              items:
                $ref: "#/components/schemas/Booking"
            totalSpent:
              type: number

    BookingStatus:
      type: string
      enum: [pending, dp_paid, fully_paid, shooting, editing, delivered, closed]

    Booking:
      type: object
      required:
        [
          id,
          clientId,
          clientName,
          categoryId,
          eventDate,
          status,
          totalAmount,
          clientOrigin,
          createdAt,
        ]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        categoryId:
          type: ["integer", "null"]
        packageId:
          type: ["integer", "null"]
        packageName:
          type: ["string", "null"]
        eventDate:
          type: string
          format: date-time
        locationName:
          type: ["string", "null"]
        locationAddress:
          type: ["string", "null"]
        mapsLink:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/BookingStatus"
        totalAmount:
          type: number
        clientOrigin:
          $ref: "#/components/schemas/ClientOrigin"
        specialRequest:
          type: ["string", "null"]
        googleDriveLink:
          type: ["string", "null"]
        detectSubfolder:
          type: boolean
        whatsappClient:
          type: ["string", "null"]
        whatsappAdmin:
          type: ["string", "null"]
        maxPhotos:
          type: integer
        pilihFotoEnabled:
          type: boolean
        downloadFotoEnabled:
          type: boolean
        pilihFotoDuration:
          type: string
        downloadFotoDuration:
          type: string
        pilihFotoPassword:
          type: ["string", "null"]
        downloadFotoPassword:
          type: ["string", "null"]
        pilihFotoTambahanEnabled:
          type: boolean
        pilihFotoCetakEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    BookingInput:
      type: object
      required: [clientId, eventDate]
      properties:
        clientId:
          type: integer
        categoryId:
          type: integer
        packageId:
          type: integer
        eventDate:
          type: string
          format: date-time
        locationName:
          type: string
        locationAddress:
          type: string
        mapsLink:
          type: string
        clientOrigin:
          $ref: "#/components/schemas/ClientOrigin"
        specialRequest:
          type: string
        moodboardLinks:
          type: array
          items:
            type: string
        teamMemberIds:
          type: array
          items:
            type: integer
        addOnIds:
          type: array
          items:
            type: integer
        googleDriveLink:
          type: string
        detectSubfolder:
          type: boolean
        whatsappClient:
          type: string
        whatsappAdmin:
          type: string
        maxPhotos:
          type: integer
        pilihFotoEnabled:
          type: boolean
        downloadFotoEnabled:
          type: boolean
        pilihFotoDuration:
          type: string
        downloadFotoDuration:
          type: string
        pilihFotoPassword:
          type: string
        downloadFotoPassword:
          type: string
        pilihFotoTambahanEnabled:
          type: boolean
        pilihFotoCetakEnabled:
          type: boolean

    BookingUpdate:
